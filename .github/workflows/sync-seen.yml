name: Sync seen_papers to main

# The cloud routine can't push straight to `main` (its harness branches first),
# so it lands seen_papers.json on a `claude/**` branch. This action copies that
# file onto `main` so the dedup state stays current. Only seen_papers.json is
# synced — never candidates.json/digest.json (they're gitignored anyway).

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'seen_papers.json'

permissions:
  contents: write

concurrency:
  group: sync-seen
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Copy seen_papers.json from the pushed branch onto main
        run: |
          git checkout "${{ github.sha }}" -- seen_papers.json
          if git diff --quiet -- seen_papers.json; then
            echo "seen_papers.json unchanged on main — nothing to sync."
            exit 0
          fi
          git config user.name "forward-pass-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_papers.json
          git commit -m "chore: sync seen papers from ${{ github.ref_name }}"
          git push origin main
